<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Workout PWA Interactive Preview v2</title>
  <meta name="description" content="Interactive v2 pre-development prototype for workout logging PWA" />
  <style>
    :root {
      --bg: #f6f8fc;
      --surface: #ffffff;
      --surface-2: #eef2f8;
      --surface-3: #e4e9f2;
      --text: #0f172a;
      --muted: #64748b;
      --line: #d8dee9;
      --strong-line: #b8c3d4;
      --accent: #3157ff;
      --accent-rgb: 49, 87, 255;
      --good: #16a34a;
      --warn: #d97706;
      --danger: #dc2626;
      --shadow: 0 22px 70px rgba(15, 23, 42, .12);
      --radius: 18px;
      --button-scale: 1;
      --font-scale: 1;
      --density-pad: 16px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      --chest: #ef4444;
      --back: #2563eb;
      --shoulders: #f59e0b;
      --biceps: #8b5cf6;
      --triceps: #06b6d4;
      --core: #10b981;
      --legs: #84cc16;
    }
    [data-theme="dark"] {
      --bg: #090e1a;
      --surface: #111827;
      --surface-2: #172033;
      --surface-3: #202a3c;
      --text: #f8fafc;
      --muted: #a1adbd;
      --line: #2b3649;
      --strong-line: #40506a;
      --shadow: 0 22px 70px rgba(0, 0, 0, .34);
    }
    [data-density="compact"] { --density-pad: 11px; }
    [data-density="comfortable"] { --density-pad: 18px; }
    [data-button-size="large"] { --button-scale: 1.12; }
    [data-button-size="small"] { --button-scale: .88; }
    [data-font-scale="large"] { --font-scale: 1.08; }
    [data-font-scale="small"] { --font-scale: .94; }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(var(--accent-rgb), .16), transparent 30rem),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, .10), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: calc(16px * var(--font-scale));
      line-height: 1.45;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    input, select, textarea { color: var(--text); }
    .app-shell { width: min(1480px, 100%); margin: 0 auto; padding: 18px; }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .brand { display:flex; align-items:center; gap: 12px; min-width: 0; }
    .logo {
      width: 46px; height: 46px; border-radius: 15px;
      background: linear-gradient(135deg, var(--accent), #16a34a);
      color: #fff; display:grid; place-items:center; font-weight: 900; letter-spacing: -.04em;
      box-shadow: 0 13px 30px rgba(var(--accent-rgb), .25);
      flex: 0 0 auto;
    }
    .brand h1 { margin: 0; font-size: 1.26rem; letter-spacing: -.04em; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: .86rem; }
    .toolbar { display:flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; align-items:center; }

    .timer-ribbon {
      display: none;
      position: sticky;
      top: 0;
      z-index: 40;
      margin: 0 0 12px;
      border: 1px solid rgba(var(--accent-rgb), .30);
      background: linear-gradient(135deg, rgba(var(--accent-rgb), .14), rgba(16,185,129,.12)), var(--surface);
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 10px 12px;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .timer-ribbon.active { display: flex; }
    .timer-pill {
      display:inline-flex; align-items:center; gap: 7px;
      border: 1px solid var(--line); background: rgba(var(--accent-rgb), .08);
      border-radius: 999px; padding: 7px 10px; font-variant-numeric: tabular-nums;
      font-weight: 800; white-space: nowrap;
    }
    .timer-ribbon .grow { flex: 1 1 280px; min-width: 0; }
    .timer-ribbon .current { color: var(--muted); font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .layout {
      display:grid;
      grid-template-columns: 235px 1fr;
      gap: 16px;
      align-items: start;
    }
    .device-phone .layout { width: min(430px, 100%); margin: 0 auto; display:block; }
    .device-phone .app-shell { padding: 10px; }
    .device-phone .topbar { grid-template-columns: 1fr; }
    .device-phone .toolbar { justify-content: flex-start; }
    .device-phone .timer-ribbon { border-radius: 14px; }

    .sidebar {
      position: sticky; top: 12px;
      background: rgba(255,255,255,.66);
      backdrop-filter: blur(16px);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 12px;
    }
    [data-theme="dark"] .sidebar { background: rgba(17,24,39,.76); }
    .device-phone .sidebar { position: static; margin-bottom: 12px; border-radius: 16px; padding: 8px; }
    .nav { display:grid; gap: 7px; }
    .device-phone .nav { grid-auto-flow: column; grid-auto-columns: max-content; overflow-x:auto; padding-bottom: 4px; }
    .nav button {
      display:flex; justify-content:flex-start; align-items:center; gap: 9px;
      width:100%; border: 1px solid transparent; border-radius: 14px;
      padding: 10px 11px; background: transparent; color: var(--muted); text-align:left;
    }
    .nav button:hover, .nav button.active { color: var(--text); background: rgba(var(--accent-rgb), .09); border-color: rgba(var(--accent-rgb), .25); }
    .device-phone .nav button { width:auto; white-space: nowrap; font-size: .82rem; padding: 8px 10px; }
    .nav-dot { width: 8px; height: 8px; border-radius:999px; background: var(--strong-line); }
    .nav button.active .nav-dot { background: var(--accent); }
    .sidebar-card { margin-top: 12px; padding: 12px; border-radius: 16px; background: var(--surface-2); border: 1px solid var(--line); }
    .device-phone .sidebar-card { display:none; }

    .main {
      min-width: 0;
      background: rgba(255,255,255,.44);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    [data-theme="dark"] .main { background: rgba(17,24,39,.55); }
    .device-phone .main { border-radius: 17px; padding: 12px; }
    .page-head { display:flex; align-items:flex-start; justify-content:space-between; gap: 12px; margin-bottom: 14px; }
    .device-phone .page-head { display:block; }
    .eyebrow { color: var(--accent); text-transform: uppercase; letter-spacing: .13em; font-size: .72rem; font-weight: 900; }
    h2 { margin: 3px 0 6px; font-size: 1.8rem; letter-spacing: -.04em; }
    .device-phone h2 { font-size: 1.35rem; }
    h3 { margin: 0 0 9px; font-size: 1.05rem; letter-spacing: -.02em; }
    p { margin: 0; color: var(--muted); }
    .head-actions { display:flex; flex-wrap:wrap; gap: 8px; justify-content:flex-end; }
    .device-phone .head-actions { justify-content:flex-start; margin-top: 10px; }

    .grid { display:grid; gap: 12px; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .device-phone .cols-2, .device-phone .cols-3, .device-phone .cols-4 { grid-template-columns: 1fr; }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: var(--density-pad);
      box-shadow: 0 8px 26px rgba(15,23,42,.06);
    }
    [data-theme="dark"] .card { box-shadow: 0 8px 26px rgba(0,0,0,.15); }
    .compact { padding: 10px; border-radius: 14px; }
    .stack { display:grid; gap: 12px; }
    .row { display:flex; align-items:center; gap: 8px; flex-wrap:wrap; }
    .between { display:flex; justify-content:space-between; align-items:center; gap: 10px; }
    .muted { color: var(--muted); }
    .small { font-size: .82rem; }
    .mono { font-variant-numeric: tabular-nums; }
    .hidden { display:none !important; }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 12px;
      min-height: calc(36px * var(--button-scale));
      padding: calc(8px * var(--button-scale)) calc(11px * var(--button-scale));
      display:inline-flex; align-items:center; justify-content:center; gap: 6px;
      transition: .15s ease;
    }
    .btn:hover { border-color: rgba(var(--accent-rgb), .48); transform: translateY(-1px); }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.good { background: rgba(22,163,74,.14); border-color: rgba(22,163,74,.32); color: var(--text); }
    .btn.warn { background: rgba(217,119,6,.13); border-color: rgba(217,119,6,.33); }
    .btn.danger { background: rgba(220,38,38,.12); border-color: rgba(220,38,38,.33); }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 29px; padding: 5px 8px; border-radius: 10px; font-size: .82rem; }
    .btn.active { outline: 2px solid rgba(var(--accent-rgb), .32); }
    .btn[disabled] { opacity: .55; cursor:not-allowed; transform:none; }

    .pill { display:inline-flex; align-items:center; gap: 6px; border-radius: 999px; padding: 5px 9px; font-size: .78rem; background: var(--surface-2); border: 1px solid var(--line); white-space:nowrap; }
    .pill.good { background: rgba(22,163,74,.12); border-color: rgba(22,163,74,.30); color: #15803d; }
    [data-theme="dark"] .pill.good { color: #bbf7d0; }
    .pill.warn { background: rgba(217,119,6,.12); border-color: rgba(217,119,6,.30); color:#b45309; }
    [data-theme="dark"] .pill.warn { color:#fed7aa; }
    .pill.danger { background: rgba(220,38,38,.12); border-color: rgba(220,38,38,.30); color:#b91c1c; }
    [data-theme="dark"] .pill.danger { color:#fecaca; }
    .pill.accent { background: rgba(var(--accent-rgb), .11); border-color: rgba(var(--accent-rgb), .28); color: var(--accent); }

    .field { display:grid; gap: 5px; }
    .field label, label.field { color: var(--muted); font-size: .82rem; font-weight: 700; }
    .input, .select, .textarea {
      width:100%; border: 1px solid var(--line); background: var(--surface); border-radius: 12px; padding: 9px 10px; outline: none;
    }
    .textarea { min-height: 78px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus { border-color: rgba(var(--accent-rgb), .55); box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .10); }
    .input.short { max-width: 92px; }

    .metric { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 14px; }
    .metric .label { color: var(--muted); font-size: .78rem; }
    .metric .value { font-size: 1.55rem; font-weight: 900; margin-top: 4px; letter-spacing: -.04em; }
    .metric .sub { color: var(--muted); font-size: .78rem; margin-top: 2px; }

    .table-wrap { overflow:auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 9px; text-align:left; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .09em; }
    tr.selected-row td { background: rgba(var(--accent-rgb), .08); }

    .group-border { border-left: 7px solid var(--group-color); }
    .group-band { display:inline-flex; align-items:center; gap: 6px; }
    .group-swatch { width: 10px; height:10px; border-radius:999px; background: var(--group-color); box-shadow: 0 0 0 3px color-mix(in srgb, var(--group-color) 18%, transparent); }
    .group-Chest { --group-color: var(--chest); }
    .group-Back { --group-color: var(--back); }
    .group-Shoulders { --group-color: var(--shoulders); }
    .group-Biceps { --group-color: var(--biceps); }
    .group-Triceps { --group-color: var(--triceps); }
    .group-Core { --group-color: var(--core); }
    .group-Legs { --group-color: var(--legs); }

    .exercise-card { position: relative; transition: .15s ease; }
    .exercise-card.selected { outline: 3px solid color-mix(in srgb, var(--group-color) 38%, transparent); box-shadow: 0 16px 34px color-mix(in srgb, var(--group-color) 13%, transparent); }
    .exercise-card.dragging, .program-day.dragging, .program-ex-row.dragging { opacity:.55; transform: scale(.99); }
    .drag-handle { cursor: grab; color: var(--muted); user-select:none; }
    .drag-target { outline: 2px dashed rgba(var(--accent-rgb), .45); outline-offset: 3px; }
    .exercise-actions { display:flex; align-items:center; gap: 7px; flex-wrap:wrap; }
    .set-list { display:grid; gap: 8px; }
    .set-row {
      border: 1px solid var(--line); border-radius: 14px; background: var(--surface-2); padding: 9px;
      display:grid; grid-template-columns: 32px 1fr auto; gap: 9px; align-items:center;
    }
    .device-phone .set-row { grid-template-columns: 28px 1fr; }
    .set-row.complete { background: rgba(22,163,74,.10); border-color: rgba(22,163,74,.24); }
    .set-main { display:grid; grid-template-columns: repeat(5, minmax(80px, 1fr)); gap: 8px; align-items:end; }
    .device-phone .set-main { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .set-advanced { grid-column: 2 / -1; padding-top: 8px; display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
    .device-phone .set-advanced { grid-column: 1 / -1; grid-template-columns: 1fr 1fr; }
    .set-actions { display:flex; gap: 6px; flex-wrap:wrap; justify-content:flex-end; }
    .device-phone .set-actions { grid-column: 1 / -1; justify-content:flex-start; }
    .section-toggle { display:flex; align-items:center; gap: 6px; color: var(--muted); font-size: .83rem; }
    .check { width: 18px; height:18px; }

    .program-board { display:grid; grid-template-columns: 340px 1fr; gap: 12px; }
    .device-phone .program-board { grid-template-columns: 1fr; }
    .day-list { display:grid; gap: 8px; }
    .program-day { padding: 11px; border: 1px solid var(--line); border-radius: 14px; background: var(--surface-2); display:flex; align-items:center; justify-content:space-between; gap: 8px; }
    .program-day.selected { border-color: rgba(var(--accent-rgb), .50); background: rgba(var(--accent-rgb), .09); }
    .program-ex-row { padding: 10px; border: 1px solid var(--line); border-radius: 14px; background: var(--surface-2); display:grid; grid-template-columns: 32px 1fr auto; gap: 8px; align-items:center; }
    .device-phone .program-ex-row { grid-template-columns: 28px 1fr; }

    .bar-row { display:grid; grid-template-columns: 120px 1fr 88px; gap: 9px; align-items:center; margin: 9px 0; }
    .device-phone .bar-row { grid-template-columns: 88px 1fr 62px; }
    .bar-track { height: 12px; border-radius: 999px; background: var(--surface-3); overflow:hidden; }
    .bar-fill { height:100%; border-radius:999px; background: linear-gradient(90deg, var(--accent), #16a34a); }

    .modal-backdrop { position: fixed; inset:0; z-index: 80; display:grid; place-items:center; background: rgba(2,6,23,.62); backdrop-filter: blur(8px); padding: 18px; }
    .modal { width: min(760px, 100%); max-height: min(780px, 92vh); overflow:auto; border-radius: 22px; background: var(--surface); border: 1px solid var(--line); box-shadow: var(--shadow); padding: 18px; }
    .toast { position: fixed; right: 18px; bottom: 18px; z-index:90; border:1px solid var(--line); background: var(--surface); border-radius: 16px; box-shadow: var(--shadow); padding: 12px 14px; max-width: min(420px, calc(100vw - 36px)); }
    .feedback-drawer { position:fixed; right: 18px; top: 76px; z-index:70; width: min(420px, calc(100vw - 36px)); background: var(--surface); border:1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow); padding: 14px; }
    .feedback-drawer.closed { display:none; }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:.78rem; padding:2px 6px; border:1px solid var(--line); border-bottom-width:2px; border-radius:7px; background: var(--surface-2); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .nav { grid-auto-flow: column; grid-auto-columns: max-content; overflow-x:auto; }
      .nav button { width:auto; white-space:nowrap; }
      .sidebar-card { display:none; }
      .cols-2,.cols-3,.cols-4 { grid-template-columns: 1fr; }
      .topbar { grid-template-columns: 1fr; }
      .toolbar { justify-content:flex-start; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
  const STORAGE_KEY = 'workoutPwaInteractivePreview.v2';

  const groups = ['Chest','Back','Shoulders','Biceps','Triceps','Core','Legs'];
  const navItems = [
    ['dashboard','Dashboard'], ['workout','Workout'], ['program','Program'], ['progression','Progression'],
    ['import','Import Review'], ['analytics','Analytics'], ['devices','Devices'], ['settings','Settings']
  ];

  const nowIso = () => new Date().toISOString();
  const uid = (prefix='id') => prefix + '_' + Math.random().toString(36).slice(2, 9);
  const escapeHtml = (v) => String(v ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmt = (n, d=0) => Number(n || 0).toLocaleString(undefined, { maximumFractionDigits:d, minimumFractionDigits:d });
  const fmtSeconds = (seconds) => {
    seconds = Math.max(0, Math.floor(Number(seconds) || 0));
    const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = seconds % 60;
    return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
  };
  const slugGroup = (g) => `group-${String(g || '').replace(/[^A-Za-z]/g,'')}`;

  function defaultExerciseDb() {
    return [
      {id:'incline-db-press', name:'Incline DB Press', group:'Chest', equipment:'dumbbell', unilateral:false, bodyweight:false, increment:2.5, low:8, high:12},
      {id:'pushups', name:'Pushups', group:'Chest', equipment:'bodyweight', unilateral:false, bodyweight:true, increment:0, low:15, high:30},
      {id:'cable-fly', name:'Cable Fly', group:'Chest', equipment:'cable', unilateral:false, bodyweight:false, increment:2.5, low:10, high:15},
      {id:'lat-pulldown', name:'Lat Pulldown', group:'Back', equipment:'cable', unilateral:false, bodyweight:false, increment:2.5, low:8, high:12},
      {id:'cable-row', name:'Cable Row', group:'Back', equipment:'cable', unilateral:false, bodyweight:false, increment:2.5, low:8, high:12},
      {id:'pullups', name:'Pullups', group:'Back', equipment:'bodyweight', unilateral:false, bodyweight:true, increment:0, low:5, high:12},
      {id:'lateral-raise', name:'DB Lateral Raise', group:'Shoulders', equipment:'dumbbell', unilateral:false, bodyweight:false, increment:2.5, low:12, high:20},
      {id:'rear-delt-fly', name:'Rear Delt Fly', group:'Shoulders', equipment:'machine', unilateral:false, bodyweight:false, increment:2.5, low:12, high:20},
      {id:'incline-db-curl', name:'Incline DB Curl', group:'Biceps', equipment:'dumbbell', unilateral:false, bodyweight:false, increment:2.5, low:10, high:15},
      {id:'bayesian-cable-curl', name:'Bayesian Cable Curl', group:'Biceps', equipment:'cable', unilateral:true, bodyweight:false, increment:2.5, low:10, high:15},
      {id:'triceps-pressdown', name:'Triceps Pressdown', group:'Triceps', equipment:'cable', unilateral:false, bodyweight:false, increment:2.5, low:10, high:15},
      {id:'overhead-extension', name:'Overhead Extension', group:'Triceps', equipment:'dumbbell', unilateral:false, bodyweight:false, increment:2.5, low:10, high:15},
      {id:'cable-crunch', name:'Cable Crunch', group:'Core', equipment:'cable', unilateral:false, bodyweight:false, increment:2.5, low:10, high:20},
      {id:'plank', name:'Plank', group:'Core', equipment:'bodyweight', unilateral:false, bodyweight:true, increment:0, low:30, high:90},
      {id:'bulgarian-split-squat', name:'Bulgarian Split Squat', group:'Legs', equipment:'dumbbell', unilateral:true, bodyweight:false, increment:2.5, low:8, high:12},
      {id:'rdl', name:'Romanian Deadlift', group:'Legs', equipment:'barbell', unilateral:false, bodyweight:false, increment:5, low:6, high:10},
      {id:'leg-extension', name:'Leg Extension', group:'Legs', equipment:'machine', unilateral:false, bodyweight:false, increment:2.5, low:10, high:15}
    ];
  }

  function defaultState() {
    const exerciseDb = defaultExerciseDb();
    const workoutExercises = [
      workoutExercise('incline-db-press', [[12,50,true],[10,50,true],[9,50,false]], 'Cycle 36: 12/10/9 @ 50 lb', 'At gym. Smooth reps.', 1),
      workoutExercise('pushups', [[24,150,false],[20,150,false],[17,150,false]], 'Cycle 36: 24/20/17 bodyweight reps', 'Bodyweight/calisthenics. Exclude from resistance volume.', 2),
      workoutExercise('incline-db-curl', [[14,17.5,true],[13,17.5,true],[14,17.5,false],[14,17.5,false]], 'Cycle 36: 14/13/14/14 @ 17.5 lb', 'At home. Controlled eccentric.', 3),
      workoutExercise('bayesian-cable-curl', [[12,12.5,false],[11,12.5,false],[10,12.5,false]], 'Cycle 36: 12/11/10 @ 12.5 lb each side', 'Cable machine reference location. Unilateral.', 4),
      workoutExercise('bulgarian-split-squat', [[10,25,false],[10,25,false],[9,25,false]], 'Cycle 35: 10/10/9 @ 25 lb', 'Unilateral movement. Double volume in analytics.', 5)
    ];
    const recommendations = {};
    workoutExercises.forEach(we => recommendations[we.id] = baseRecommendation(we, exerciseDb));
    return {
      version: 2,
      screen: 'dashboard',
      deviceMode: 'desktop',
      theme: 'dark',
      accent: '#3157ff',
      density: 'comfortable',
      buttonSize: 'normal',
      fontScale: 'normal',
      online: true,
      pendingChanges: 0,
      toast: null,
      feedbackOpen: false,
      feedbackDraft: '',
      feedback: [],
      bodyweight: 150,
      workout: {
        cycle: 37,
        day: 1,
        date: '2026-05-03',
        location: 'Home/Gym selectable',
        status: 'in_progress',
        notes: 'Workout-specific notes live here. Example: home session, limited cable access, 90 second rests.',

  function workoutExercise(exerciseId, setPairs, last, note, order) {
    return {

    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);
      if (!parsed || parsed.version !== 2) return defaultState();
      return parsed;
    } catch { return defaultState(); }
  }
  let state = loadState();

  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function mutate(fn, message) { fn(); state.pendingChanges += 1; saveState(); render(); if (message) toast(message); }
  function liveUpdate(fn) { fn(); state.pendingChanges += 1; saveState(); }
  function toast(message) { state.toast = message; saveState(); renderToast(); window.clearTimeout(window.__toast); window.__toast = setTimeout(() => { state.toast = null; saveState(); renderToast(); }, 3200); }
  function exercise(id) { return state.exerciseDb.find(e => e.id === id) || state.exerciseDb[0]; }
  function selectedWorkoutExercise() { return state.workout.exercises.find(we => we.id === state.workout.selectedExerciseId) || state.workout.exercises[0]; }
  function selectedProgramDay() { return state.program.days.find(d => d.id === state.program.selectedDayId) || state.program.days[0]; }
  function baseRecommendation(we, db=state.exerciseDb) {
    const ex = db.find(e => e.id === we.exerciseId) || db[0];
    const completed = (we.sets || []).filter(s => s.complete);
    const load = Math.max(0, ...(we.sets || []).map(s => Number(s.load)||0));
    const minRep = completed.length ? Math.min(...completed.map(s => Number(s.reps)||0)) : ex.low;
    const hitTop = completed.length >= (we.sets || []).length && completed.every(s => (Number(s.reps)||0) >= ex.high);
    if (ex.bodyweight) return {sets: (we.sets || []).length, reps:`${Math.min(ex.high, minRep+1)}-${ex.high}`, load:'reps only', reason:'Bodyweight/calisthenics progress by reps or density and stay outside resistance volume.', edited:false, accepted:false};
    if (hitTop) return {sets:(we.sets || []).length, reps:String(ex.low), load:fmt(load + ex.increment, 1), reason:`All sets reached ${ex.high}; increase by ${ex.increment} lb.`, edited:false, accepted:false};
    return {sets:(we.sets || []).length, reps:`raise lowest to ${Math.min(ex.high, minRep+1)}`, load:fmt(load, 1), reason:'Rep-first/double progression: add reps before increasing load.', edited:false, accepted:false};
  }

  function resistanceVolume(we) {
    const ex = exercise(we.exerciseId);
    if (ex.bodyweight) return 0;
    const raw = we.sets.reduce((sum, s) => sum + ((s.complete ? 1 : 0) * (Number(s.reps)||0) * (Number(s.load)||0)), 0);
    return raw * (ex.unilateral ? 2 : 1);
  }
  function bodyweightReps(we) {
    const ex = exercise(we.exerciseId);
    if (!ex.bodyweight) return 0;
    return we.sets.reduce((sum, s) => sum + ((s.complete ? 1 : 0) * (Number(s.reps)||0)), 0);
  }
  function completedSets(we) { return we.sets.filter(s => s.complete).length; }
  function isExerciseComplete(we) { return we.completed || (we.sets.length > 0 && we.sets.every(s => s.complete)); }
  function workoutStats() {
    const totalSets = state.workout.exercises.reduce((s,we)=>s+completedSets(we),0);
    const plannedSets = state.workout.exercises.reduce((s,we)=>s+we.sets.length,0);
    const volume = state.workout.exercises.reduce((s,we)=>s+resistanceVolume(we),0);
    const bw = state.workout.exercises.reduce((s,we)=>s+bodyweightReps(we),0);
    const completeExercises = state.workout.exercises.filter(isExerciseComplete).length;
    return {totalSets, plannedSets, volume, bw, completeExercises};
  }
  function activeWorkoutSeconds() {
    if (!state.workout.startedAt) return 0;
    const end = state.workout.endedAt ? new Date(state.workout.endedAt).getTime() : Date.now();
    return (end - new Date(state.workout.startedAt).getTime()) / 1000;
  }
  function activeRestSeconds() {
    const r = state.workout.activeRest;
    if (!r || !r.startedAt) return 0;
    return (Date.now() - new Date(r.startedAt).getTime()) / 1000;
  }
  function activeRestRemaining() {
    const r = state.workout.activeRest;
    if (!r) return 0;

  }
  function parseTags(text) {
    const t = String(text || '').toLowerCase();
    const tags = [];
    if (/at home|\bhome\b/.test(t)) tags.push(['location','home']);
    if (/at gym|\bgym\b/.test(t)) tags.push(['location','gym']);
    if (/cable machine|\bcable\b/.test(t)) tags.push(['equipment','cable machine']);
    if (/failure|to failure/.test(t)) tags.push(['set','failure']);
    if (/myo ?reps?|myo-reps?/.test(t)) tags.push(['set','myoreps']);
    if (/drop ?set/.test(t)) tags.push(['set','drop set']);
    if (/partial|partial rom/.test(t)) tags.push(['set','partials']);
    if (/pain|ache|injur|strain|hurt/.test(t)) tags.push(['pain','pain/injury']);
    return tags;
  }
  function setAccent(hex) {

    if (!Number.isNaN(r)) document.documentElement.style.setProperty('--accent-rgb', `${r}, ${g}, ${b}`);
  }

  function cycleData(lookback) {
    const max = 37;
    const count = lookback === 'all' || Number.isNaN(lookback) ? 36 : Number(lookback);
    const start = Math.max(1, max - count + 1);
    const arr = [];
    for (let c=start; c<=max; c++) {
      arr.push({cycle:c, volume: 18500 + c*430 + ((c%4)-2)*850, sets: 74 + (c%6)*4, prs: Math.max(0, (c%5)-1)});
    }
    return arr;
  }
  function renderBars(data, metric) {
    const max = Math.max(1, ...data.map(d => d[metric] || 0));
    return `<div>${data.map(d=>`<div class="bar-row"><span class="small">Cycle ${d.cycle}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round((d[metric]||0)/max*100)}%"></div></div><strong>${fmt(d[metric]||0)}</strong></div>`).join('')}</div>`;
  }

    const host = document.getElementById('toastHost');
    if (!host) return;
    host.innerHTML = state.toast ? `<div class="toast">${escapeHtml(state.toast)}</div>` : '';
  }

  function updateTimers() {
    const setText = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };
    const session = fmtSeconds(activeWorkoutSeconds());
    setText('globalSessionTimer', session); setText('dashSessionTimer', session); setText('workoutSessionTimer', session);
    if (state.workout.activeRest) {
      const remaining = activeRestRemaining();
      setText('workoutRestTimer', remaining > 0 ? fmtSeconds(remaining) : 'Rest complete');
      const ribbon = document.getElementById('timerRibbon');
      if (ribbon) {
        const pills = ribbon.querySelectorAll('.timer-pill');
        if (pills[1]) pills[1].textContent = remaining > 0 ? `Rest ${fmtSeconds(remaining)}` : 'Rest complete';
      }
    }
  }
  setInterval(updateTimers, 1000);

  function findWorkoutExercise(id) { return state.workout.exercises.find(we => we.id === id); }
  function findSet(we, sid) { return we.sets.find(s => s.id === sid); }
  function startWorkoutIfNeeded() { if (!state.workout.startedAt) state.workout.startedAt = nowIso(); }
  function startRestAfterExercise(we) {
    const idx = state.workout.exercises.findIndex(x=>x.id===we.id);
    const next = state.workout.exercises[idx+1];
    state.workout.activeRest = {startedAt: nowIso(), durationSeconds: Number(state.settings.defaultRestSeconds)||90, afterExerciseId: we.id, nextExerciseId: next ? next.id : null};
    if (next) state.workout.selectedExerciseId = next.id;
  }
  function reorderById(arr, fromId, toId) {
    const from = arr.findIndex(x => x.id === fromId), to = arr.findIndex(x => x.id === toId);
    if (from < 0 || to < 0 || from === to) return;
    const [item] = arr.splice(from, 1); arr.splice(to, 0, item);
  }
  function reorderExerciseIds(arr, fromIndex, toIndex) {
    if (fromIndex < 0 || toIndex < 0 || fromIndex === toIndex) return;
    const [item] = arr.splice(fromIndex, 1); arr.splice(toIndex, 0, item);
  }

  document.addEventListener('click', (e) => {
    const el = e.target.closest('[data-action]'); if (!el) return;
    const a = el.dataset.action;
    if (a === 'nav') return mutate(()=>{state.screen = el.dataset.screen;}, null);
    if (a === 'toggleOnline') return mutate(()=>{state.online=!state.online;}, state.online?'Offline mode enabled. Changes will queue.':'Online mode enabled.');
    if (a === 'toggleDevice') return mutate(()=>{state.deviceMode = state.deviceMode === 'phone' ? 'desktop' : 'phone';}, null);
    if (a === 'toggleTheme') return mutate(()=>{state.theme = state.theme === 'dark' ? 'light' : 'dark'; state.settings.themeMode = state.theme;}, null);
    if (a === 'resetDemo') { if (confirm('Reset the v2 prototype state?')) { state = defaultState(); saveState(); render(); toast('Demo reset.'); } return; }
    if (a === 'toggleFeedback') return mutate(()=>{state.feedbackOpen=!state.feedbackOpen;}, null);
    if (a === 'startWorkout') return mutate(()=>{startWorkoutIfNeeded(); state.workout.endedAt=null;}, 'Workout timer started. Persistent ribbon is visible.');
    if (a === 'endWorkout') return mutate(()=>{state.workout.endedAt=nowIso(); state.workout.activeRest=null;}, 'Workout ended.');
    if (a === 'selectWorkoutExercise') return mutate(()=>{state.workout.selectedExerciseId = el.dataset.id;}, null);
    if (a === 'toggleWorkoutCollapse') return mutate(()=>{state.workout[el.dataset.key] = !state.workout[el.dataset.key];}, null);
    if (a === 'toggleExerciseCollapse') return mutate(()=>{const we=findWorkoutExercise(el.dataset.id); if(we) we.collapsed=!we.collapsed;}, null);
    if (a === 'toggleSetCollapse') return mutate(()=>{const we=findWorkoutExercise(el.dataset.we); const s=we&&findSet(we,el.dataset.set); if(s) s.collapsed=!s.collapsed;}, null);
    if (a === 'completeExercise') return mutate(()=>{const we=findWorkoutExercise(el.dataset.id); if(we){startWorkoutIfNeeded(); we.sets.forEach(s=>{s.complete=true; if(!s.end) s.end=nowIso();}); we.completed=true; startRestAfterExercise(we);}}, 'Exercise completed. Rest period started before the next exercise.');
    if (a === 'startNextExercise') return mutate(()=>{const nextId=state.workout.activeRest && state.workout.activeRest.nextExerciseId; if(nextId) state.workout.selectedExerciseId=nextId; state.workout.activeRest=null;}, 'Next exercise selected.');
    if (a === 'completeSet') return mutate(()=>{const we=findWorkoutExercise(el.dataset.we); const s=we&&findSet(we,el.dataset.set); if(s){startWorkoutIfNeeded(); s.complete=el.checked; s.end=s.complete?nowIso():null; if(s.complete && state.settings.autoRest) s.restAfter=Number(state.settings.defaultRestSeconds)||90;}}, null);
    if (a === 'copyPreviousSet') return mutate(()=>{const we=findWorkoutExercise(el.dataset.we); const i=Number(el.dataset.index); if(we && i>0){const prev=we.sets[i-1], cur=we.sets[i]; Object.assign(cur,{reps:prev.reps, load:prev.load, type:prev.type, rir:prev.rir, rpe:prev.rpe});}}, 'Previous set copied.');
    if (a === 'setType') return mutate(()=>{const we=findWorkoutExercise(el.dataset.we); const s=we&&findSet(we,el.dataset.set); if(s) s.type=el.dataset.type;}, null);
    if (a === 'addSet') return mutate(()=>{const we=findWorkoutExercise(el.dataset.we); if(we){const last=we.sets.at(-1)||{reps:10,load:0}; we.sets.push({id:uid('set'),index:we.sets.length+1,reps:last.reps,load:last.load,complete:false,type:'standard',rir:'',rpe:'',note:'',collapsed:false,start:null,end:null,restAfter:null});}}, 'Set added.');
    if (a === 'selectProgramDay') return mutate(()=>{state.program.selectedDayId=el.dataset.id;}, null);
    if (a === 'addProgramDay') return mutate(()=>{const n=state.program.days.length+1; const id=uid('day'); state.program.days.push({id,day:n,title:`Custom Day ${n}`,status:'training',notes:'',exercises:[]}); state.program.selectedDayId=id;}, 'Program day added.');
    if (a === 'generateProgramSuggestion') return mutate(()=>{state.program.days[0].exercises=['incline-db-press','cable-fly','incline-db-curl','bayesian-cable-curl'];}, 'Suggested order applied to Day 1. You can drag after recommendation.');
    if (a === 'selectProgramExercise') return mutate(()=>{state.program.selectedExerciseId = `${el.dataset.dayId}:${el.dataset.indexId}`;}, null);
    if (a === 'moveProgramExercise') return mutate(()=>{const d=state.program.days.find(x=>x.id===el.dataset.day); const i=Number(el.dataset.index), dir=el.dataset.dir==='up'?-1:1; if(d) reorderExerciseIds(d.exercises,i,Math.max(0,Math.min(d.exercises.length-1,i+dir)));}, null);
    if (a === 'removeProgramExercise') return mutate(()=>{const d=state.program.days.find(x=>x.id===el.dataset.day); if(d) d.exercises.splice(Number(el.dataset.index),1);}, 'Exercise removed from program day.');
    if (a === 'addProgramExercise') return mutate(()=>{const d=state.program.days.find(x=>x.id===el.dataset.day); const sel=document.getElementById('programAddExercise'); if(d && sel) d.exercises.push(sel.value);}, 'Exercise added to program day.');
    if (a === 'makeRestDay') return mutate(()=>{const d=state.program.days.find(x=>x.id===el.dataset.day); if(d){d.status='rest'; d.exercises=[];}}, 'Day changed to rest.');
    if (a === 'toggleSkipProgression') return mutate(()=>{state.progression.skipCycle=!state.progression.skipCycle; state.progression.log.push({id:uid('plog'),at:new Date().toISOString().slice(0,10),cycle:state.workout.cycle,exercise:'All exercises',action:state.progression.skipCycle?'Skip cycle enabled':'Skip cycle disabled',detail:'Global cycle-level progression option changed.',usedInAnalytics:true});}, null);
    if (a === 'recalculateRecommendations') return mutate(()=>{state.workout.exercises.forEach(we=>state.progression.recommendations[we.id]=baseRecommendation(we));}, 'Recommendations recalculated.');
    if (a === 'acceptRecommendation') return mutate(()=>{const we=findWorkoutExercise(el.dataset.we); const ex=we&&exercise(we.exerciseId); const rec=state.progression.recommendations[we.id]; if(we&&ex&&rec){rec.accepted=true; state.progression.log.push({id:uid('plog'),at:new Date().toISOString().slice(0,10),cycle:state.workout.cycle,exercise:ex.name,action:state.progression.skipCycle?'Logged only because cycle skipped':'Accepted as future default',detail:`${rec.sets} sets · ${rec.reps} reps · ${rec.load} load. ${rec.reason}`,usedInAnalytics:true});}}, 'Recommendation logged.');
    if (a === 'logOneRecommendation') return mutate(()=>{const we=findWorkoutExercise(el.dataset.we); const ex=we&&exercise(we.exerciseId); const rec=state.progression.recommendations[we.id]; if(we&&ex&&rec) state.progression.log.push({id:uid('plog'),at:new Date().toISOString().slice(0,10),cycle:state.workout.cycle,exercise:ex.name,action:'Logged recommendation',detail:`${rec.sets} sets · ${rec.reps} reps · ${rec.load}.`,usedInAnalytics:true});}, 'Recommendation added to detailed log.');
    if (a === 'logProgressionSnapshot') return mutate(()=>{state.workout.exercises.forEach(we=>{const ex=exercise(we.exerciseId), rec=state.progression.recommendations[we.id]; state.progression.log.push({id:uid('plog'),at:new Date().toISOString().slice(0,10),cycle:state.workout.cycle,exercise:ex.name,action:state.progression.skipCycle?'Cycle skipped / logged':'Snapshot logged',detail:`${rec.sets} sets · ${rec.reps} reps · ${rec.load}.`,usedInAnalytics:true});});}, 'All current recommendations logged.');
    if (a === 'resolveWarning') return mutate(()=>{const w=state.importReview.warnings.find(x=>x.id===el.dataset.id); if(w) w.status = w.status==='review'?'resolved':'review';}, null);
    if (a === 'commitImport') return mutate(()=>{state.importReview.committed=true;}, 'Import committed in preview.');
    if (a === 'exportMockExcel') return exportMockExcel();
    if (a === 'simulateConflict') return mutate(()=>{state.devices.conflict.open=true; state.devices.conflict.resolved=false;}, null);
    if (a === 'closeConflict') return mutate(()=>{state.devices.conflict.open=false;}, null);
    if (a === 'resolveConflict') return mutate(()=>{state.devices.conflict.resolved=true; state.devices.conflict.resolution=el.dataset.version; state.devices.conflict.open=false;}, `Conflict resolved using ${el.dataset.version}.`);
    if (a === 'terminateSession') return mutate(()=>{const s=state.devices.sessions.find(x=>x.id===el.dataset.id); if(s) s.status='terminated';}, 'Device session terminated.');
    if (a === 'saveSettings') return mutate(()=>{}, 'Settings saved in preview.');
    if (a === 'addExerciseDb') return addExerciseDb();
    if (a === 'deleteExerciseDb') return mutate(()=>{state.exerciseDb = state.exerciseDb.filter(x=>x.id!==el.dataset.id);}, 'Exercise deleted from preview database.');
    if (a === 'saveFeedback') return mutate(()=>{if(state.feedbackDraft.trim()){state.feedback.push({screen:state.screen,text:state.feedbackDraft.trim(),at:new Date().toISOString()}); state.feedbackDraft='';}}, 'Feedback saved.');
    if (a === 'exportFeedback') return exportJson('workout-preview-v2-feedback.json', {exportedAt:new Date().toISOString(), feedback:state.feedback});
  });

  document.addEventListener('input', (e) => {
    const el = e.target.closest('[data-action]'); if (!el) return;
    const a = el.dataset.action;
    if (a === 'workoutNotes') return liveUpdate(()=>{state.workout.notes=el.value;});
    if (a === 'exerciseNote') return liveUpdate(()=>{const we=findWorkoutExercise(el.dataset.we); if(we) we.note=el.value;});
    if (a === 'setInput') return liveUpdate(()=>{const we=findWorkoutExercise(el.dataset.we); const s=we&&findSet(we,el.dataset.set); if(s){const field=el.dataset.field; s[field] = ['reps','load','restAfter'].includes(field) ? Number(el.value) : el.value;}});
    if (a === 'programDayInput') return liveUpdate(()=>{const d=state.program.days.find(x=>x.id===el.dataset.day); if(d){d[el.dataset.field] = el.dataset.field==='day' ? Number(el.value) : el.value;}});
    if (a === 'recInput') return liveUpdate(()=>{const rec=state.progression.recommendations[el.dataset.we]; if(rec){rec[el.dataset.field]=el.value; rec.edited=true;}});
    if (a === 'aliasInput') return liveUpdate(()=>{const x=state.importReview.aliases.find(a=>a.id===el.dataset.id); if(x) x.canonical=el.value;});
    if (a === 'feedbackDraft') return liveUpdate(()=>{state.feedbackDraft=el.value;});
    if (a === 'exerciseDbInput') return liveUpdate(()=>{const ex=state.exerciseDb.find(x=>x.id===el.dataset.id); if(ex){ex[el.dataset.field]=['increment'].includes(el.dataset.field)?Number(el.value):el.value; if(el.dataset.field==='equipment' && el.value==='bodyweight'){ex.bodyweight=true; ex.increment=0;}}});
    if (a === 'accentInput') return mutate(()=>{state.accent=el.value;}, null);
  });

  document.addEventListener('change', (e) => {
    const el = e.target.closest('[data-action]'); if (!el) return;
    const a = el.dataset.action;
    if (['workoutNotes','exerciseNote','setInput','programDayInput','recInput','aliasInput','feedbackDraft','exerciseDbInput'].includes(a)) return render();
    if (a === 'aliasReview') return mutate(()=>{const x=state.importReview.aliases.find(a=>a.id===el.dataset.id); if(x) x.review=el.checked;}, null);
    if (a === 'analyticsInput') return mutate(()=>{state.analytics[el.dataset.field]=el.value;}, null);
    if (a === 'settingInput') return mutate(()=>{state.settings[el.dataset.field] = el.type==='number' ? Number(el.value) : el.value; if(el.dataset.field==='themeMode' && el.value !== 'system') state.theme=el.value;}, null);
    if (a === 'settingCheckbox') return mutate(()=>{state.settings[el.dataset.field]=el.checked;}, null);
    if (a === 'densityInput') return mutate(()=>{state.density=el.value;}, null);
    if (a === 'buttonSizeInput') return mutate(()=>{state.buttonSize=el.value;}, null);
    if (a === 'fontScaleInput') return mutate(()=>{state.fontScale=el.value;}, null);
  });

  function addExerciseDb() {
    const name = document.getElementById('newExerciseName')?.value.trim();
    const group = document.getElementById('newExerciseGroup')?.value || 'Chest';
    const equipment = document.getElementById('newExerciseEquipment')?.value || 'other';
    const unilateral = !!document.getElementById('newExerciseUnilateral')?.checked;
    const bodyweight = !!document.getElementById('newExerciseBodyweight')?.checked || equipment === 'bodyweight';
    if (!name) return toast('Enter an exercise name first.');
    mutate(()=>{state.exerciseDb.push({id:uid('ex'),name,group,equipment,unilateral,bodyweight,increment:bodyweight?0:(equipment==='barbell'?5:2.5),low:8,high:12});}, 'Exercise added to database.');
  }

  document.addEventListener('dragstart', (e) => {
    const el = e.target.closest('[draggable="true"]'); if (!el) return;
    e.dataTransfer.setData('text/plain', JSON.stringify({...el.dataset}));
    el.classList.add('dragging');
  });
  document.addEventListener('dragend', (e) => { const el=e.target.closest('.dragging'); if(el) el.classList.remove('dragging'); document.querySelectorAll('.drag-target').forEach(x=>x.classList.remove('drag-target')); });
  document.addEventListener('dragover', (e) => { const target=e.target.closest('[draggable="true"]'); if(target){ e.preventDefault(); target.classList.add('drag-target'); } });
  document.addEventListener('dragleave', (e) => { const target=e.target.closest('.drag-target'); if(target) target.classList.remove('drag-target'); });
  document.addEventListener('drop', (e) => {
    const target = e.target.closest('[draggable="true"]'); if (!target) return;
    e.preventDefault(); target.classList.remove('drag-target');
    let src; try { src = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
    if (src.dragType === 'workoutExercise' && target.dataset.dragType === 'workoutExercise') {
      return mutate(()=>{reorderById(state.workout.exercises, src.dragId, target.dataset.dragId);}, 'Workout exercise order updated.');
    }
    if (src.dragType === 'programDay' && target.dataset.dragType === 'programDay') {
      return mutate(()=>{reorderById(state.program.days, src.dragId, target.dataset.dragId); state.program.days.forEach((d,i)=>d.day=i+1);}, 'Program day order updated.');
    }
    if (src.dragType === 'programExercise' && target.dataset.dragType === 'programExercise' && src.day === target.dataset.day) {
      return mutate(()=>{const d=state.program.days.find(x=>x.id===src.day); if(d) reorderExerciseIds(d.exercises, Number(src.index), Number(target.dataset.index));}, 'Program exercise order updated.');
    }
  });

  function exportJson(filename, obj) {
    const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }
  function exportMockExcel() {
    const rows = [['Sheet','Description'],['Workout Log','Sets, notes, timer data'],['Cycle Summary','Lookback analytics'],['Exercise Tracker','Per-exercise history'],['Progression Log','Recommendation decisions']];
    const csv = rows.map(r => r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='workout-preview-v2-export-mock.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast('Mock Excel-style export downloaded.');
  }

  render();
  </script>
</body>
</html>
